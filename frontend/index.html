<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <title>Vibely | Share Your Vibes</title>
    <meta
      name="description"
      content="Vibely is a social media app to share posts, stories, and vibes with your community in real time."
    />
    <meta
      name="keywords"
      content="Vibely, social media, stories, posts, messaging, community, full stack app"
    />
    <meta name="author" content="Vibely Team" />
    <meta name="robots" content="index, follow" />

    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="canonical" href="https://vibely-social-media-app.vercel.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vibely" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Vibely | Share Your Vibes" />
    <meta
      property="og:description"
      content="Share posts, stories, and vibes with your friends on Vibely."
    />
    <meta property="og:url" content="https://vibely-social-media-app.vercel.app/" />
    <meta property="og:image" content="https://vibely-social-media-app.vercel.app/banner.png" />
    <meta property="og:image:alt" content="Vibely social app preview" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vibely | Share Your Vibes" />
    <meta
      name="twitter:description"
      content="A modern social media app for sharing posts, stories, and real-time vibes."
    />
    <meta name="twitter:image" content="https://vibely-social-media-app.vercel.app/banner.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Vibely",
        "url": "https://vibely-social-media-app.vercel.app/",
        "description": "Vibely is a social media platform for sharing posts, stories, and vibes.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://vibely-social-media-app.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Vibely",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Web",
        "url": "https://vibely-social-media-app.vercel.app/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
